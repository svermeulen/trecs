name: Bug Report
description: Report a bug in Trecs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: unity-version
    attributes:
      label: Unity Version
      description: Which version of Unity are you using?
      placeholder: "e.g., 6000.3.10f1"
    validations:
      required: true

  - type: input
    id: trecs-version
    attributes:
      label: Trecs Version
      description: Which version of Trecs are you using?
      placeholder: "e.g., 0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Create a system that...
        2. Add an entity with...
        3. Call World.Tick()
        4. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Traces
      description: Paste any relevant logs or stack traces here.
      render: shell
    validations:
      required: false
