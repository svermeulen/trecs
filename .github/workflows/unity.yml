name: Unity

on:
  push:
    branches: [main, 'dev/v*']
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - uses: actions/cache@v4
        with:
          path: UnityProject/Trecs/Library
          key: Library-${{ hashFiles('UnityProject/Trecs/Packages/manifest.json', 'UnityProject/Trecs/Packages/packages-lock.json') }}
          restore-keys: |
            Library-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: UnityProject/Trecs
          testMode: all
          unityVersion: 6000.3.10f1
          customImage: unityci/editor:ubuntu-6000.3.10f1-base-3
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  # Editor test runs (the `test` job above) execute under Mono in the editor,
  # where Burst JIT-compiles lazily and silently falls back to managed code on a
  # compile error — so a Burst AOT error like BC1040 ("Tag<T>.Value cannot be
  # burst compiled", issue #10) never fails those runs. Building a Standalone
  # Player invokes the Burst AOT compiler, where such an error is fatal. This job
  # builds + runs the PlayMode tests as a StandaloneLinux64 IL2CPP player (the
  # project's configured Standalone backend), so Burst AOT errors turn CI red.
  standalone-test:
    name: Run Standalone (AOT) Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - uses: actions/cache@v4
        with:
          path: UnityProject/Trecs/Library
          key: Library-standalone-${{ hashFiles('UnityProject/Trecs/Packages/manifest.json', 'UnityProject/Trecs/Packages/packages-lock.json') }}
          restore-keys: |
            Library-standalone-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: UnityProject/Trecs
          testMode: standalone
          unityVersion: 6000.3.10f1
          # IL2CPP StandaloneLinux64 needs the linux-il2cpp module image, not -base-.
          customImage: unityci/editor:ubuntu-6000.3.10f1-linux-il2cpp-3
          githubToken: ${{ secrets.GITHUB_TOKEN }}
