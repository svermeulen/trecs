site_name: Trecs
site_description: A high-performance Entity Component System framework for Unity
repo_url: https://github.com/svermeulen/trecs
repo_name: svermeulen/trecs
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    scheme: default
    primary: teal
    accent: deep orange
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Glossary: glossary.md
  - Core:
      - Components: core/components.md
      - Tags: core/tags.md
      - Templates: core/templates.md
      - Entities: core/entities.md
      - Systems: core/systems.md
      - World Setup: core/world-setup.md
      - Input System: core/input-system.md
  - Data Access:
      - Queries & Iteration: data-access/queries-and-iteration.md
      - Aspects: data-access/aspects.md
  - Entity Management:
      - Structural Changes: entity-management/structural-changes.md
      - Sets: entity-management/sets.md
      - Entity Events: entity-management/entity-events.md
  - Performance:
      - Jobs & Burst: performance/jobs-and-burst.md
      - Dependency Tracking: performance/dependency-tracking.md
  - Guides:
      - Best Practices: guides/best-practices.md
      - Gotchas: guides/gotchas.md
      - OOP Integration: guides/oop-integration.md
      - Entity Subset Patterns: guides/entity-subset-patterns.md
      - Trecs vs Unity ECS: guides/trecs-vs-unity-ecs.md
  - Advanced:
      - Accessor Roles: advanced/accessor-roles.md
      - Time & RNG: advanced/time-and-rng.md
      - Interpolation: advanced/interpolation.md
      - Heap: advanced/heap.md
      - Shared Heap Data: advanced/shared-heap-data.md
      - Fixed Collections: advanced/fixed-collections.md
      - Trecs Collections: advanced/trecs-collections.md
      - Aspect Interfaces: advanced/aspect-interfaces.md
      - Pausing & Disabling Systems: advanced/pausing-and-disabling-systems.md
      - Groups, GroupIndex & TagSets: advanced/groups-and-tagsets.md
      - Advanced Job Features: advanced/advanced-jobs.md
      - Serialization: advanced/serialization.md
  - Editor Windows:
      - Overview: editor-windows/index.md
      - Hierarchy: editor-windows/hierarchy.md
      - Player: editor-windows/player.md
      - Saves: editor-windows/saves.md
  - Samples:
      - Overview: samples/index.md
      - 01 - Hello Entity: samples/01-hello-entity.md
      - 02 - Spawn & Destroy: samples/02-spawn-and-destroy.md
      - 03 - Aspects: samples/03-aspects.md
      - 04 - Predator Prey: samples/04-predator-prey.md
      - 05 - Job System: samples/05-job-system.md
      - 06 - Partitions: samples/06-partitions.md
      - 07 - Feeding Frenzy: samples/07-feeding-frenzy.md
      - 08 - Sets: samples/08-sets.md
      - 09 - Interpolation: samples/09-interpolation.md
      - 10 - Pointers: samples/10-pointers.md
      - 11 - Snake: samples/11-snake.md
      - 12 - Feeding Frenzy Benchmark: samples/12-feeding-frenzy-benchmark.md
      - 13 - Native Pointers: samples/13-native-pointers.md
      - 14 - Aspect Interfaces: samples/14-aspect-interfaces.md
      - 15 - Blob Storage: samples/15-blob-storage.md
      - 16 - Reactive Events: samples/16-reactive-events.md
      - 17 - Multiple Worlds: samples/17-multiple-worlds.md
  - FAQ: faq.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

extra_css:
  - stylesheets/extra.css
