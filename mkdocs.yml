site_name: Trecs
site_description: A high-performance Entity Component System framework for Unity
repo_url: https://github.com/svermeulen/trecs
repo_name: svermeulen/trecs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Overview: concepts/index.md
      - Components: concepts/components.md
      - Templates & Tags: concepts/templates-and-tags.md
      - Systems: concepts/systems.md
      - Queries & Iteration: concepts/queries-and-iteration.md
  - Guides:
      - Aspects & Source Generation: guides/aspects-and-source-generation.md
      - Jobs & Scheduling: guides/jobs-and-scheduling.md
      - Entity Subset Patterns: guides/entity-subset-patterns.md
      - Structural Changes: guides/structural-changes.md
      - Blobs & Heaps: guides/blobs-and-heaps.md
      - OOP Abstraction Layer: guides/oop-abstraction-layer.md
      - Serialization: guides/serialization.md
  - Architecture:
      - System Execution Model: architecture/system-execution-model.md
      - Thread Safety: architecture/thread-safety.md
      - Design Rules: architecture/design-rules.md
      - ECS Architecture Comparison: architecture/ecs-architecture-comparison.md
  - Reference:
      - Trecs vs Unity ECS: reference/trecs-vs-unity-ecs.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
