site_name: Trecs
site_description: A high-performance Entity Component System framework for Unity
repo_url: https://github.com/svermeulen/trecs
repo_name: svermeulen/trecs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core:
      - World Setup: core/world-setup.md
      - Entities: core/entities.md
      - Components: core/components.md
      - Templates: core/templates.md
      - Tags: core/tags.md
      - Systems: core/systems.md
  - Data Access:
      - Queries & Iteration: data-access/queries-and-iteration.md
      - Aspects: data-access/aspects.md
  - Entity Management:
      - Structural Changes: entity-management/structural-changes.md
      - Sets: entity-management/sets.md
      - Entity Events: entity-management/entity-events.md
  - Performance:
      - Jobs & Burst: performance/jobs-and-burst.md
      - Dependency Tracking: performance/dependency-tracking.md
  - Advanced:
      - Groups & TagSets: advanced/groups-and-tagsets.md
      - Heap: advanced/heap.md
      - Interpolation: advanced/interpolation.md
      - Serialization: advanced/serialization.md
      - Recording & Playback: advanced/recording-and-playback.md
      - Input System: advanced/input-system.md
      - Time & RNG: advanced/time-and-rng.md
  - Samples:
      - Overview: samples/index.md
      - 01 - Hello Entity: samples/01-hello-entity.md
      - 02 - Spawn & Destroy: samples/02-spawn-and-destroy.md
      - 03 - Aspects: samples/03-aspects.md
      - 04 - Predator Prey: samples/04-predator-prey.md
      - 05 - Job System: samples/05-job-system.md
      - 06 - Partitions: samples/06-partitions.md
      - 07 - Feeding Frenzy: samples/07-feeding-frenzy.md
      - 08 - Sets: samples/08-sets.md
      - 09 - Interpolation: samples/09-interpolation.md
      - 10 - Pointers: samples/10-pointers.md
      - 11 - Snake: samples/11-snake.md
      - 12 - Feeding Frenzy Benchmark: samples/12-feeding-frenzy-benchmark.md
  - Recipes:
      - OOP Integration: recipes/oop-integration.md
      - Entity Subset Patterns: recipes/entity-subset-patterns.md
      - Design Rules: recipes/design-rules.md
      - Trecs vs Unity ECS: recipes/trecs-vs-unity-ecs.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
