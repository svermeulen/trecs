site_name: Trecs
site_description: A high-performance Entity Component System framework for Unity
repo_url: https://github.com/svermeulen/trecs
repo_name: svermeulen/trecs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Glossary: glossary.md
  - Core:
      - World Setup: core/world-setup.md
      - Components: core/components.md
      - Tags: core/tags.md
      - Templates: core/templates.md
      - Entities: core/entities.md
      - Systems: core/systems.md
      - Input System: core/input-system.md
  - Data Access:
      - Queries & Iteration: data-access/queries-and-iteration.md
      - Aspects: data-access/aspects.md
  - Entity Management:
      - Structural Changes: entity-management/structural-changes.md
      - Sets: entity-management/sets.md
      - Entity Events: entity-management/entity-events.md
  - Performance:
      - Jobs & Burst: performance/jobs-and-burst.md
      - Dependency Tracking: performance/dependency-tracking.md
  - Recipes:
      - Trecs vs Unity ECS: recipes/trecs-vs-unity-ecs.md
      - Design Rules: recipes/design-rules.md
      - OOP Integration: recipes/oop-integration.md
      - Entity Subset Patterns: recipes/entity-subset-patterns.md
      - Debugging & Troubleshooting: recipes/debugging.md
  - Advanced:
      - Accessor Roles: advanced/accessor-roles.md
      - Time & RNG: advanced/time-and-rng.md
      - Interpolation: advanced/interpolation.md
      - System Control: advanced/system-control.md
      - Heap: advanced/heap.md
      - Heap Allocation Rules: advanced/heap-allocation-rules.md
      - Aspect Interfaces: advanced/aspect-interfaces.md
      - Advanced Job Features: advanced/advanced-jobs.md
      - Fixed Collections: advanced/fixed-collections.md
      - Groups, GroupIndex & TagSets: advanced/groups-and-tagsets.md
      - Serialization: advanced/serialization.md
      - Recording & Playback: advanced/recording-and-playback.md
      - Binary Format: advanced/binary-format.md
      - Source Generator Reference: advanced/source-generator-reference.md
  - Editor Windows:
      - Overview: editor-windows/index.md
      - Hierarchy: editor-windows/hierarchy.md
      - Player: editor-windows/player.md
      - Saves: editor-windows/saves.md
  - Samples:
      - Overview: samples/index.md
      - 01 - Hello Entity: samples/01-hello-entity.md
      - 02 - Spawn & Destroy: samples/02-spawn-and-destroy.md
      - 03 - Aspects: samples/03-aspects.md
      - 04 - Predator Prey: samples/04-predator-prey.md
      - 05 - Job System: samples/05-job-system.md
      - 06 - Partitions: samples/06-partitions.md
      - 07 - Feeding Frenzy: samples/07-feeding-frenzy.md
      - 08 - Sets: samples/08-sets.md
      - 09 - Interpolation: samples/09-interpolation.md
      - 10 - Pointers: samples/10-pointers.md
      - 11 - Snake: samples/11-snake.md
      - 12 - Feeding Frenzy Benchmark: samples/12-feeding-frenzy-benchmark.md
      - 13 - Save Game: samples/13-save-game.md
      - 14 - Native Pointers: samples/14-native-pointers.md
      - 15 - Aspect Interfaces: samples/15-aspect-interfaces.md
      - 17 - Blob Storage: samples/17-blob-storage.md
      - 18 - Reactive Events: samples/18-reactive-events.md
      - 19 - Multiple Worlds: samples/19-multiple-worlds.md
  - FAQ: faq.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
